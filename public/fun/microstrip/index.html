<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microstrip Designer 3D</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Microstrip Designer</h1>
        <p class="subtitle">
          Enter target impedance and material properties to generate dimensions
          and a 3D model.
        </p>

        <form id="design-form" class="form-grid">
          <label>
            Target Impedance (Ohm)
            <input id="z0" type="number" min="1" step="0.1" value="50" required />
          </label>

          <label>
            Substrate Height h (mm)
            <input id="h" type="number" min="0.01" step="0.01" value="1.6" required />
          </label>

          <label>
            Relative Permittivity er
            <input id="er" type="number" min="1.01" step="0.01" value="4.3" required />
          </label>

          <label>
            Trace Length (mm)
            <input id="length" type="number" min="1" step="1" value="40" required />
          </label>

          <label>
            Copper Thickness t (mm)
            <input id="t" type="number" min="0.001" step="0.001" value="0.035" required />
          </label>

          <label>
            Trace-to-GND Gap (mm)
            <input id="gnd-gap" type="number" min="0.05" step="0.05" value="0.3" required />
          </label>

          <div class="toggle-row" role="group" aria-label="Top layer ground options">
            <label class="check">
              <input id="gnd-left" type="checkbox" />
              Add Left GND
            </label>
            <label class="check">
              <input id="gnd-right" type="checkbox" />
              Add Right GND
            </label>
          </div>

          <button type="submit">Generate Design</button>
        </form>

        <section class="results">
          <h2>Computed Results</h2>
          <p><strong>Line Width W:</strong> <span id="result-w">-</span></p>
          <p><strong>W / h:</strong> <span id="result-wh">-</span></p>
          <p><strong>Effective Permittivity:</strong> <span id="result-eeff">-</span></p>
        </section>
      </section>

      <section class="viewer-wrap">
        <div id="viewer"></div>
        <p class="hint">Drag to rotate, wheel to zoom, right-drag to pan.</p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
