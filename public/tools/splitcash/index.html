<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SplitCash</title>
    <meta
      name="description"
      content="私人共享記帳工具，使用 Firebase 同步房間資料，適合旅遊、聚餐與小團隊分帳。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260312b" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Private Room Ledger</p>
          <h1>SplitCash</h1>
          <p class="hero-copy">
            給私下分帳用的小工具。每個房間都用密碼保護，資料會透過 Firebase 即時同步，適合旅遊、
            聚餐、室友和小型團隊記帳。
          </p>
          <div id="room-status-display" class="room-status-display" hidden>
            <p class="room-status-text"><span id="room-status-label">同步完成</span>：<strong id="room-status-name">--</strong></p>
            <button id="leave-room-button-compact" class="ghost-button leave-room-compact" type="button">離開</button>
          </div>
        </div>
        <div class="hero-badge">
          <span id="sync-status">等待連線</span>
          <strong id="room-status">Firebase room sync</strong>
          <button id="leave-room-button" class="ghost-button hero-leave-button" type="button" hidden>離開房間</button>
        </div>
      </header>

      <main id="app-grid" class="app-grid room-only">
        <section id="room-panel" class="panel room-panel">
          <div class="panel-head">
            <h2>房間</h2>
          </div>
          <div id="room-entry-section">
            <form id="room-form" class="stack-form">
              <label>
                房間代碼
                <input id="room-code-input" name="roomCode" type="text" placeholder="例如 tainan-trip" required />
              </label>
              <label>
                房間密碼
                <input id="room-secret-input" name="roomSecret" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="4 碼 PIN" required />
              </label>
              <div class="actions">
                <button type="submit">進入房間</button>
              </div>
            </form>
            <p class="hint">首頁只顯示房間入口。進入房間後才會展開完整功能。</p>
          </div>

          <div id="room-discovery-section">
            <div class="panel-head subhead">
              <h2>可用房間</h2>
            </div>
            <div id="room-list-panel" class="room-list empty-state">房間列表載入中</div>
          </div>
        </section>

        <nav id="section-tabs" class="section-tabs" hidden aria-label="SplitCash sections">
          <button type="button" class="section-tab is-active" data-section-tab="expense">支出</button>
          <button type="button" class="section-tab" data-section-tab="member">成員</button>
          <button type="button" class="section-tab" data-section-tab="summary">結算</button>
          <button type="button" class="section-tab" data-section-tab="history">紀錄</button>
        </nav>

        <section id="member-section" class="panel app-section is-hidden">
          <div class="panel-head">
            <h2>成員</h2>
            <span id="member-count">0 人</span>
          </div>
          <form id="member-form" class="inline-form">
            <input id="member-name-input" name="memberName" type="text" placeholder="新增成員名稱" required />
            <button type="submit">新增</button>
          </form>
          <div id="member-list" class="chip-list empty-state">還沒有成員</div>
        </section>

        <section id="expense-section" class="panel wide-panel app-section is-hidden">
          <div class="panel-head">
            <h2 id="expense-form-title">新增支出</h2>
            <span id="expense-count">0 筆</span>
          </div>
          <form id="expense-form" class="expense-form">
            <label>
              品項
              <input id="expense-title-input" name="title" type="text" placeholder="例如 晚餐、計程車" required />
            </label>
            <label>
              金額
              <input
                id="expense-amount-input"
                name="amount"
                type="number"
                inputmode="decimal"
                min="0"
                step="0.01"
                placeholder="0.00"
                required
              />
            </label>
            <label>
              誰先付
              <select id="expense-payer-select" name="payerId" required>
                <option value="">請先建立成員</option>
              </select>
            </label>
            <fieldset class="wide-field">
              <legend>分攤方式</legend>
              <div class="split-mode-toggle">
                <label class="split-mode-option">
                  <input type="radio" name="splitMode" value="equal" checked />
                  <span>平均分</span>
                </label>
                <label class="split-mode-option">
                  <input type="radio" name="splitMode" value="custom" />
                  <span>自訂金額</span>
                </label>
              </div>
            </fieldset>
            <fieldset>
              <legend>一起分攤的人</legend>
              <div id="participant-options" class="checkbox-grid empty-state">請先建立成員</div>
              <p id="split-mode-hint" class="field-hint">平均分會把總金額平分給勾選的人。</p>
            </fieldset>
            <label class="wide-field">
              備註
              <input id="expense-note-input" name="note" type="text" placeholder="可留空" />
            </label>
            <div class="actions wide-field">
              <button id="expense-submit-button" type="submit">新增支出</button>
              <button id="expense-cancel-button" class="ghost-button" type="button" hidden>取消編輯</button>
            </div>
          </form>
        </section>

        <section id="summary-section" class="panel app-section is-hidden">
          <div class="panel-head">
            <h2>結算</h2>
            <span id="total-spent">$0.00</span>
          </div>
          <div id="settlement-list" class="settlement-list empty-state">目前沒有待結算款項</div>
          <div class="panel-head subhead">
            <h2>已結算紀錄</h2>
          </div>
          <div id="payment-history" class="payment-history empty-state">還沒有已結算紀錄</div>
        </section>

        <section id="history-section" class="panel wide-panel app-section is-hidden">
          <div class="panel-head">
            <h2>支出紀錄</h2>
          </div>
          <div id="expense-list" class="expense-list empty-state">新增後就會顯示支出紀錄</div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="./firebase-config.js"></script>
    <script type="module" src="./app.js?v=20260312b"></script>
  </body>
</html>
